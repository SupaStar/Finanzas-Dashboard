spring.application.name=finanzas-dash
logging.level.org.flywaydb=DEBUG

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/finanzas
spring.datasource.username=finanzas_admin
spring.datasource.password=esto_es_un_secreto

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.flyway.default-schema=public

# ===============================
# QUARTZ y SESSION
# ===============================
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.session.jdbc.initialize-schema=always

# ===============================
# JWT
# ===============================
jwt.sign=ultra-clave-secreta-obedsosa_de_32_bytes-funcionandoowo
jwt.expiration=60000