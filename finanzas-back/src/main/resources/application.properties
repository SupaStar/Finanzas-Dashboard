spring.application.name=finanzas-dash

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finanzas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finanzas_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:esto_es_un_secreto}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.flyway.default-schema=public

# ===============================
# QUARTZ y SESSION
# ===============================
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.session.jdbc.initialize-schema=never

# ===============================
# JWT
# ===============================
jwt.sign=${JWT_SIGN:ultra-clave-secreta-obedsosa_de_32_bytes-funcionandoowo}
jwt.expiration=${JWT_EXPIRATION:180000}

# ===============================
# CLIENTS
# ===============================
stock_py.service.url=${STOCK_PY:http://localhost:8000}