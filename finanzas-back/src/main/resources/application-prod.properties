spring.application.name=finanzas-dash

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finanzas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finanzas_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:esto_es_un_secreto}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===============================
# JPA/HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.flyway.default-schema=public

# ===============================
# QUARTZ y SESSION
# ===============================
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.session.jdbc.initialize-schema=never

# ===============================
# JWT
# ===============================
jwt.sign=${JWT_SIGN:ultra-clave-secreta-obedsosa_de_32_bytes-funcionandoowo}
jwt.expiration=${JWT_EXPIRATION:180000}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.finanzas.dash=INFO

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===============================
# CLIENTS
# ===============================
stock_py.service.url=${STOCK_PY:http://localhost:8000}